version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cmms-prod-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cmms_db}
      POSTGRES_USER: ${POSTGRES_USER:-cmms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmms_user} -d ${POSTGRES_DB:-cmms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmms-prod-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cmms-prod-frontend
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: cmms-prod-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  prod_postgres_data:
