version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cmms-postgres-db
    restart: always
    environment:
      POSTGRES_DB: cmms_db
      POSTGRES_USER: cmms_user
      POSTGRES_PASSWORD: cmms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
