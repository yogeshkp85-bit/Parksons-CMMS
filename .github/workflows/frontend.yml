name: Frontend CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Production Compile
      run: |
        cd frontend
        npm run build

    - name: Validate Frontend Docker Build
      run: |
        cd frontend
        docker build -t cmms-frontend-test:latest .
